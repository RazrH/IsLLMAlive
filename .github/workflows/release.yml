name: Build and Release

on:
  push:
    tags:
      - 'v*' # 当推送形如 v1.0.0 的 tag 时自动触发
  workflow_dispatch: # 允许在 GitHub 网页端手动触发构建

permissions:
  contents: read

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: isllmalive-windows-amd64.exe
            goos: windows
            goarch: amd64
            cgo: 0
          - os: windows-latest
            artifact_name: isllmalive-windows-arm64.exe
            goos: windows
            goarch: arm64
            cgo: 0
          - os: ubuntu-latest
            artifact_name: isllmalive-linux-amd64
            goos: linux
            goarch: amd64
            cgo: 1
          - os: macos-15-intel
            artifact_name: isllmalive-macos-amd64
            goos: darwin
            goarch: amd64
            cgo: 1
          - os: macos-latest
            artifact_name: isllmalive-macos-arm64
            goos: darwin
            goarch: arm64
            cgo: 1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libgtk-3-dev libayatana-appindicator3-dev

      - name: Verify
        env:
          CGO_ENABLED: ${{ matrix.cgo }}
        run: go test -trimpath -mod=readonly ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            go build -trimpath -mod=readonly -ldflags "-s -w -H=windowsgui" -o ${{ matrix.artifact_name }} ./cmd/isllmalive
          else
            go build -trimpath -mod=readonly -ldflags "-s -w" -o ${{ matrix.artifact_name }} ./cmd/isllmalive
          fi
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
